<div class="d-flex flex-row min-w-screen min-h-screen align-items-center justify-content-center">
  <mat-card class="min-w-[500px]">
    <mat-card-content class="p-4">
      <div class="d-flex flex-column align-items-center gap-2">
        <div>
          <img src="assets/img/brand/logo.svg" alt="ÖRK Logo" width="200px" height="54px"/>
          <h1>Tafel Admin</h1>
        </div>
        @if (errorMessage()) {
          <div testid="errorMessage" class="tafel-banner-error">
            <div>{{ errorMessage() }}</div>
          </div>
        }
        <div class="flex flex-column gap-2 m-4">
          <div class="flex flex-row align-items-center">
            <fa-icon [icon]="faUser" class="mr-2"></fa-icon>
            <input [formField]="loginForm.username" matInput testid="username" type="text" class="form-control"
                   placeholder="Benutzername" autocomplete="username" tafelAutofocus>
          </div>
          <div class="flex flex-row align-items-center">
            <fa-icon [icon]="faKey" class="mr-2"></fa-icon>
            <input [formField]="loginForm.password" matInput testid="password" type="password"
                   class="form-control" placeholder="Passwort" autocomplete="current-password">
          </div>
        </div>

        <button testid="loginButton" matButton="filled" [disabled]="!loginForm().valid()" (click)="login()">
          Anmelden
        </button>
      </div>
    </mat-card-content>
  </mat-card>
</div>
