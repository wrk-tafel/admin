<div class="min-h-screen flex items-center justify-center bg-slate-50 p-4">
  <div class="w-full max-w-2xl">
    <mat-card class="p-4 md:p-8 shadow-md">
      <mat-card-content>
        <div class="flex flex-col items-center mb-8 text-center">
          <img
            src="assets/img/brand/logo.svg"
            alt="Logo"
            class="mb-4 h-[54px] w-[200px] object-contain"
          />
          <h3 class="mat-headline-6 font-semibold text-slate-800">
            Tafel Admin - Passwort ändern
          </h3>
        </div>

        <div class="mb-6">
          <tafel-passwordchange-form></tafel-passwordchange-form>
        </div>

        <div class="flex flex-row justify-start gap-2 mt-4">
          <button
            matButton="filled"
            testid="saveButton"
            (click)="changePassword()"
            [disabled]="saveDisabled()"
          >
            Speichern
          </button>
          <button
            mat-raised-button
            type="button"
            testid="cancelButton"
            (click)="cancel()"
          >
            Abbrechen
          </button>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
</div>
