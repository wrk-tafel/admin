<c-row>
  <c-col>
    <c-card>
      <c-card-header>
        <h5>Statistik</h5>
      </c-card-header>
      <c-card-body>
        <c-row>
          <c-col>
            <c-row>
              <c-col class="fw-bold mb-2">Schnellauswahl</c-col>
            </c-row>
            <c-row>
              <c-col>
                <button cButton class="mt-2 mt-md-0" (click)="onSelectCurrentYear()">Aktuelles Jahr</button>
                <button cButton class="ms-2 ms-md-0 ms-lg-2 mt-2 mt-lg-0" (click)="onSelectCurrentMonth()">Aktuelles Monat</button>
              </c-col>
            </c-row>
            <c-row class="mt-3">
              <c-col sm="2">
                <label class="form-label">Jahr</label>
              </c-col>
              <c-col sm="5">
                <select testid="yearInput" #yearSelect class="form-control" cSelect [ngModel]="undefined"
                        (ngModelChange)="onYearSelected($event); yearSelect.value = undefined;">
                  <option [ngValue]="undefined"></option>
                  @for (year of settings()?.availableYears; track year) {
                    <option [ngValue]="year">{{ year }}</option>
                  }
                </select>
              </c-col>
            </c-row>
            <c-row class="mt-2">
              <c-col sm="2">
                <label class="form-label">Ausgabe</label>
              </c-col>
              <c-col sm="5">
                <select testid="distributionDateInput" #distributionSelect class="form-control" cSelect
                        [ngModel]="undefined"
                        (ngModelChange)="onDistributionSelected($event); distributionSelect.value = undefined;">
                  <option [ngValue]="undefined"></option>
                  @for (distribution of settings()?.distributions; track distribution.startDate) {
                    <option [ngValue]="distribution">{{ distribution.startDate | date : 'dd.MM.yyyy' }}</option>
                  }
                </select>
              </c-col>
            </c-row>
          </c-col>
          <c-col>
            <c-row>
              <c-col class="fw-bold mb-2 mt-3 mt-md-0">Zeitraum</c-col>
            </c-row>
            <c-row>
              <c-col sm="2">
                <label class="form-label">von</label>
              </c-col>
              <c-col sm="5">
                <input testid="dataRangeFromInput" type="date" class="form-control" [(ngModel)]="dateRangeFrom">
              </c-col>
            </c-row>
            <c-row class="mt-2">
              <c-col sm="2">
                <label class="form-label">bis</label>
              </c-col>
              <c-col sm="5">
                <input testid="dataRangeToInput" type="date" class="form-control" [(ngModel)]="dateRangeTo">
              </c-col>
            </c-row>
          </c-col>
        </c-row>
      </c-card-body>
    </c-card>
  </c-col>
  <c-col sm="3" class="mt-3 mt-md-0">
    <c-card class="h-100">
      <c-card-header>
        <h5>Export</h5>
      </c-card-header>
      <c-card-body>
        <button cButton (click)="generateCsv()">
          <svg [cIcon]="cilSave" size="xl" title="List Icon"></svg>&nbsp;CSV-Export
        </button>
      </c-card-body>
    </c-card>
  </c-col>
</c-row>
@if (statisticsData()) {
  <c-row>
    <c-col>
      <c-card class="mt-3">
        <c-card-header>
          <h5>Zeitraum: {{ dateRangeFrom | date: 'dd.MM.yyyy' }} - {{ dateRangeTo | date: 'dd.MM.yyyy' }}</h5>
        </c-card-header>
        <c-card-body>
          <c-row>
            <c-col>
              <h5>Kunden und Personen</h5>
            </c-col>
          </c-row>
          <c-row>
            <c-col sm="4">
              <tafel-statistics-panel [data]="statisticsData().beneficiaryCustomers"></tafel-statistics-panel>
            </c-col>
            <c-col sm="4" class="mt-2 mt-md-0">
              <tafel-statistics-panel [data]="statisticsData().beneficiaryPersons"></tafel-statistics-panel>
            </c-col>
            <c-col sm="4" class="mt-2 mt-md-0">
              <tafel-statistics-panel
                [data]="statisticsData().beneficiaryCustomersWithChildren"></tafel-statistics-panel>
            </c-col>
          </c-row>
          <c-row class="mt-3">
            <c-col>
              <h5>Notschlafstellen</h5>
            </c-col>
          </c-row>
          <c-row>
            <c-col sm="6">
              <tafel-statistics-panel [data]="statisticsData().sheltersCount"></tafel-statistics-panel>
            </c-col>
            <c-col sm="6" class="mt-2 mt-md-0">
              <tafel-statistics-panel [data]="statisticsData().sheltersAverage"></tafel-statistics-panel>
            </c-col>
          </c-row>
        </c-card-body>
      </c-card>
    </c-col>
  </c-row>
}
