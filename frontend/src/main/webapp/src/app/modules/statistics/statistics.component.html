<c-row>
  <c-col>
    <c-card>
      <c-card-header>
        <h5>Statistik / {{ dateRangeFrom | date: 'dd.MM.yyyy' }} - {{ dateRangeTo | date: 'dd.MM.yyyy' }}</h5>
      </c-card-header>
      <c-card-body>
        <c-row>
          <c-col>
            <c-row>
              <c-col class="fw-bold mb-2">Schnellauswahl</c-col>
            </c-row>
            <c-row>
              <c-col sm="2">
                <label class="form-label">Jahr</label>
              </c-col>
              <c-col sm="3">
                <select testid="yearInput" class="form-control" cSelect [ngModel]="undefined"
                        (ngModelChange)="onYearSelected($event)">
                  <option [ngValue]="undefined"></option>
                  @for (year of settings()?.availableYears; track year) {
                    <option [ngValue]="year">{{ year }}</option>
                  }
                </select>
              </c-col>
              <c-col>
                <button cButton class="mt-2 mt-md-0" (click)="onYearSelected(currentYear)">{{ currentYear }}</button>
              </c-col>
            </c-row>
            <c-row class="mt-2">
              <c-col sm="2">
                <label class="form-label">Ausgabe</label>
              </c-col>
              <c-col sm="3">
                <select testid="distributionDateInput" class="form-control" cSelect [ngModel]="undefined"
                        (ngModelChange)="onDistributionSelected($event)">
                  <option [ngValue]="undefined"></option>
                  @for (distribution of settings()?.distributions; track distribution.startDate) {
                    <option [ngValue]="distribution">{{ distribution.startDate | date : 'dd.MM.yyyy' }}</option>
                  }
                </select>
              </c-col>
            </c-row>
          </c-col>
          <c-col>
            <c-row>
              <c-col class="fw-bold mb-2 mt-3 mt-md-0">Zeitraum</c-col>
            </c-row>
            <c-row>
              <c-col sm="2">
                <label class="form-label">von</label>
              </c-col>
              <c-col sm="5">
                <input testid="dataRangeFromInput" type="date" class="form-control" [(ngModel)]="dateRangeFrom">
              </c-col>
            </c-row>
            <c-row class="mt-2">
              <c-col sm="2">
                <label class="form-label">bis</label>
              </c-col>
              <c-col sm="5">
                <input testid="dataRangeToInput" type="date" class="form-control" [(ngModel)]="dateRangeTo">
              </c-col>
            </c-row>
          </c-col>
        </c-row>
      </c-card-body>
    </c-card>
    @if (statisticsData()) {
      <c-card class="mt-3">
        <c-card-body>
          <c-row>
            <c-col>
              <h5>Kunden</h5>
            </c-col>
          </c-row>
          <c-row>
            <c-col sm="3">
              <tafel-statistics-panel subTitle="Bezugsberechtigte" [data]="statisticsData().beneficiaries"></tafel-statistics-panel>
            </c-col>
          </c-row>
        </c-card-body>
      </c-card>
    }
  </c-col>
</c-row>
