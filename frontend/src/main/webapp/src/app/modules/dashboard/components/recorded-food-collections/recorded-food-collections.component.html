<mat-card class="h-100 mat-card-{{ panelColor() }}" testid="recorded-food-collections-panel">
  <mat-card-header>
    <mat-card-title>
      <h4 class="text-white">Erfasste Routen</h4>
    </mat-card-title>
  </mat-card-header>
  <mat-card-content class="text-end">
    @if (countRecorded() !== null && countTotal() !== null) {
      <div testid="recorded-food-collections-count" class="text-5xl">{{ countRecorded() }} / {{ countTotal() }}</div>
    } @else {
      <div testid="recorded-food-collections-count" class="text-5xl">-</div>
    }
  </mat-card-content>
</mat-card>
