<mat-card class="h-100 mat-card-primary">
  <mat-card-header>
    <mat-card-title>
      <h4>Anmerkungen</h4>
    </mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <mat-form-field class="w-100" appearance="fill">
      <textarea
        matInput
        testid="distribution-notes-textarea"
        placeholder="Notizen für diese Ausgabe eingeben ..."
        [ngModel]="notes()"
        (ngModelChange)="notes.set($event)"
        rows="7"
        [disabled]="inputIsDisabled()"
      ></textarea>
    </mat-form-field>
  </mat-card-content>
  <mat-card-footer class="mt-3">
    <button
      mat-raised-button
      testid="distribution-notes-save-button"
      (click)="save()"
      [disabled]="inputIsDisabled()"
    >
      Speichern
    </button>
  </mat-card-footer>
</mat-card>
