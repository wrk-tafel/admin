<mat-card class="distribution-state-card" [ngClass]="isDistributionActive() ? 'state-open' : 'state-closed'">
  <mat-card-content>
    <h4 class="m-0 text-gray-300 font-light">Status</h4>
    <h1 class="m-0 font-bold" testid="distribution-state-text">
      {{isDistributionActive() ? 'Ge&ouml;ffnet' : 'Geschlossen'}}
    </h1>
  </mat-card-content>
  <mat-card-actions>
    @if (!isDistributionActive()) {
      <button mat-flat-button
              testid="distribution-start-button"
              color="primary"
              (click)="createNewDistribution()">Tag starten
      </button>
    }
    @if (isDistributionActive()) {
      <button mat-flat-button
              testid="distribution-close-button"
              color="warn"
              (click)="openCloseDistributionDialog()">Tag beenden
      </button>
    }
  </mat-card-actions>
</mat-card>
