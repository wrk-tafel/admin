<mat-card class="h-100 mat-card-primary">
  <mat-card-header>
    <mat-card-title>
      <h4>Status</h4>
    </mat-card-title>
  </mat-card-header>
  <mat-card-content class="text-center">
    <div testid="distribution-state-text" class="fw-bold text-5xl">{{isDistributionActive() ? 'Geöffnet' : 'Geschlossen'}}</div>
  </mat-card-content>
  <mat-card-footer class="mt-4">
    @if (!isDistributionActive()) {
      <button testid="distribution-start-button"
              mat-raised-button
              (click)="createNewDistribution()">Tag starten
      </button>
    }
    @if (isDistributionActive()) {
      <button testid="distribution-close-button"
              mat-raised-button
              (click)="openCloseDistributionDialog()">Tag beenden
      </button>
    }
  </mat-card-footer>
</mat-card>
