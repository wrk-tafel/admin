<c-card class="h-100" [color]="isDistributionActive() ? 'success' : 'primary'" textColor="white">
  <c-card-body>
    <c-row>
      <c-col>
        <h4>Status</h4>
      </c-col>
    </c-row>
    <c-row>
      <c-col testid="distribution-state-text" class="fw-bold">
        <h1>{{isDistributionActive() ? 'Geöffnet' : 'Geschlossen'}}</h1>
      </c-col>
    </c-row>
  </c-card-body>
  <c-card-footer>
    @if (!isDistributionActive()) {
      <button cButton color="light"
              testid="distribution-start-button"
              (click)="createNewDistribution()">Tag starten
      </button>
    }
    @if (isDistributionActive()) {
      <button cButton color="light"
              testid="distribution-close-button"
              (click)="openCloseDistributionDialog()">Tag beenden
      </button>
    }
  </c-card-footer>
</c-card>
