<div class="flex gap-6">
  <mat-card class="w-full md:w-1/3">
    <mat-card-header>
      <mat-card-title>
        <div class="flex items-center gap-2">
          <fa-icon [icon]="faEnvelope" />
          <h5 class="mb-0 mt-1">E-Mails erneut senden</h5>
        </div>
      </mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <mat-form-field class="w-full mt-4">
        <mat-label>Ausgabe vom:</mat-label>
        <mat-select [value]="selectedDistribution()" (selectionChange)="selectedDistribution.set($event.value)">
          @for (distribution of distributions(); track distribution) {
            <mat-option [value]="distribution">
              {{ distribution.startedAt | date : 'dd.MM.yyyy' }}
            </mat-option>
          }
        </mat-select>
      </mat-form-field>
    </mat-card-content>
    <mat-card-footer class="mt-4">
      <button matButton="filled"
              [disabled]="!selectedDistribution()"
              (click)="sendMails()">
        E-Mails erneut senden
      </button>
    </mat-card-footer>
  </mat-card>
</div>
