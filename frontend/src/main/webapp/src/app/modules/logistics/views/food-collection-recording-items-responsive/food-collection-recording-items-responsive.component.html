@if (currentShop) {
  <div class="mt-3 mb-3">
    <c-row>
      <c-col class="col-3 fw-bold">Filiale:</c-col>
      <c-col class="col-9">
        {{ currentShop.id + ' - ' + currentShop.name }}
      </c-col>
    </c-row>
    <c-row>
      <c-col class="col-3"></c-col>
      <c-col class="col-9">
        {{ currentShop.address }}
      </c-col>
    </c-row>
    <c-row class="mt-3">
      <c-col class="text-center">
        <button cButton (click)="selectPreviousShop()"
                [disabled]="this.selectedRouteData().shops.indexOf(currentShop) === 0">
          Vorherige
        </button>
      </c-col>
      <c-col class="text-center">
        <button cButton (click)="selectNextShop()" [disabled]="this.selectedRouteData().shops.indexOf(currentShop) === this.selectedRouteData().shops.length - 1">
          Nächste
        </button>
      </c-col>
    </c-row>
    <c-row>
      <c-col>
        <hr>
      </c-col>
    </c-row>
    @for (category of foodCategories(); track category.id) {
      <c-row class="mb-2">
        <c-col class="col-6">
          {{ category.name }}
        </c-col>
        <c-col class="col-6">
          <tafel-counter-input [testId]="'category-' + category.id + '-input'"
                               [key]="category.id"
                               [value]="categoryValues[category.id]"
                               (valueChanged)="onValueChange($event)"></tafel-counter-input>
        </c-col>
      </c-row>
    }
    <c-row>
      <c-col>
        <hr>
      </c-col>
    </c-row>
    <c-row>
      <c-col>
        <button testid="save-items-button" cButton (click)="save()">Speichern</button>
      </c-col>
    </c-row>
  </div>
}
