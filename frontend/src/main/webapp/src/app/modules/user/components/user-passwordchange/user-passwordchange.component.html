<mat-card class="shadow-sm">
  <mat-card-header class="border-b border-slate-100 bg-slate-50/50 pb-3">
    <mat-card-title class="text-base font-bold text-slate-800">
      Passwort ändern
    </mat-card-title>
  </mat-card-header>

  <mat-card-content class="pt-6">
    <tafel-passwordchange-form></tafel-passwordchange-form>
  </mat-card-content>

  <mat-card-actions align="start" class="bg-slate-50/50 px-4 py-3 border-t border-slate-100">
    <button
      mat-flat-button
      testid="saveButton"
      (click)="changePassword()"
      [disabled]="isSaveDisabled()"
    >
      Speichern
    </button>
  </mat-card-actions>
</mat-card>
