<tafel-dialog testId="validationresult-dialog" [type]="dialogType()" [title]="dialogTitle()">
  <div tafel-dialog-content>
    <div class="d-flex justify-content-between py-1">
      <span class="fw-bold">Limit (inkl. Toleranz von {{ data.validationResult.toleranceValue }}&nbsp;&euro;):</span>
      <span>{{ data.validationResult.limit | number : '1.2-2' }}&nbsp;&euro;</span>
    </div>
    <div class="d-flex justify-content-between py-1">
      <span class="fw-bold">Einkommen gesamt:</span>
      <span>{{ data.validationResult.totalSum | number : '1.2-2' }}&nbsp;&euro;</span>
    </div>
    <hr>
    <div class="d-flex justify-content-between py-1">
      <span class="fw-bold">Einkommen über Limit:</span>
      <span [ngClass]="{'text-danger': !data.validationResult.valid}">
        {{ data.validationResult.amountExceededLimit | number : '1.2-2' }}&nbsp;&euro;
      </span>
    </div>
  </div>
  <div tafel-dialog-actions>
    <button testid="ok-button" cButton (click)="dialogRef.close()">OK</button>
  </div>
</tafel-dialog>
